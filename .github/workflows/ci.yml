name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --project apps/api --extra dev --frozen
      - run: uv run --project apps/api ruff check apps/api
      - run: uv run --project apps/api mypy apps/api/src
      - run: uv run --project apps/api pytest apps/api

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.12.0
      - uses: actions/setup-node@v7
        with:
          node-version: 22.14.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm --dir apps/web lint
      - run: pnpm --dir apps/web typecheck
      - run: pnpm --dir apps/web test --runInBand
      - run: pnpm --dir apps/web build

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose --env-file .env.example config --quiet
